kind = "web"
previewPath = "/"
title = "ClarifAI"
version = "1.0.0"
id = "artifacts/clarifai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18875

[services.development]
run = "pnpm --filter @workspace/clarifai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/clarifai", "run", "build" ]
publicDir = "artifacts/clarifai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18875"
BASE_PATH = "/"
