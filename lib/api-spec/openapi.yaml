openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: ClarifAI - AI Tutoring Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: documents
    description: Document management
  - name: chat
    description: AI chat conversations
  - name: quizzes
    description: Quiz generation and management
  - name: flashcards
    description: Flashcard management
  - name: analytics
    description: Analytics and learning stats
  - name: users
    description: User management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Documents ────────────────────────────────────────────────────────────────
  /documents:
    get:
      operationId: listDocuments
      tags: [documents]
      summary: List all uploaded documents
      responses:
        "200":
          description: List of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Document"
    post:
      operationId: uploadDocument
      tags: [documents]
      summary: Upload a document for RAG processing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentInput"
      responses:
        "201":
          description: Document uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"

  /documents/{id}:
    get:
      operationId: getDocument
      tags: [documents]
      summary: Get document by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Document
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Document"
    delete:
      operationId: deleteDocument
      tags: [documents]
      summary: Delete a document
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /documents/stats:
    get:
      operationId: getDocumentStats
      tags: [documents]
      summary: Document statistics summary
      responses:
        "200":
          description: Document stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentStats"

  # ── Chat ─────────────────────────────────────────────────────────────────────
  /conversations:
    get:
      operationId: listConversations
      tags: [chat]
      summary: List all conversations
      responses:
        "200":
          description: Conversations list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"
    post:
      operationId: createConversation
      tags: [chat]
      summary: Create a new conversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConversationInput"
      responses:
        "201":
          description: Created conversation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"

  /conversations/{id}:
    get:
      operationId: getConversation
      tags: [chat]
      summary: Get a conversation with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Conversation with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationDetail"
    delete:
      operationId: deleteConversation
      tags: [chat]
      summary: Delete a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /conversations/{id}/messages:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message and get AI response
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: AI response message
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"

  /conversations/recent:
    get:
      operationId: getRecentConversations
      tags: [chat]
      summary: Get recent conversations with activity
      responses:
        "200":
          description: Recent conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Conversation"

  # ── Quizzes ──────────────────────────────────────────────────────────────────
  /quizzes:
    get:
      operationId: listQuizzes
      tags: [quizzes]
      summary: List all quizzes
      responses:
        "200":
          description: Quizzes list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Quiz"
    post:
      operationId: generateQuiz
      tags: [quizzes]
      summary: Generate a quiz from uploaded documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizGenerationInput"
      responses:
        "201":
          description: Generated quiz
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Quiz"

  /quizzes/{id}:
    get:
      operationId: getQuiz
      tags: [quizzes]
      summary: Get quiz with questions
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Quiz detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizDetail"
    delete:
      operationId: deleteQuiz
      tags: [quizzes]
      summary: Delete a quiz
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /quizzes/{id}/submit:
    post:
      operationId: submitQuizAttempt
      tags: [quizzes]
      summary: Submit a quiz attempt
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuizAttemptInput"
      responses:
        "200":
          description: Quiz result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QuizResult"

  # ── Flashcards ───────────────────────────────────────────────────────────────
  /flashcard-sets:
    get:
      operationId: listFlashcardSets
      tags: [flashcards]
      summary: List all flashcard sets
      responses:
        "200":
          description: Flashcard sets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FlashcardSet"
    post:
      operationId: generateFlashcards
      tags: [flashcards]
      summary: Generate flashcard set from documents
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlashcardGenerationInput"
      responses:
        "201":
          description: Generated flashcard set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardSet"

  /flashcard-sets/{id}:
    get:
      operationId: getFlashcardSet
      tags: [flashcards]
      summary: Get flashcard set with cards
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Flashcard set detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardSetDetail"
    delete:
      operationId: deleteFlashcardSet
      tags: [flashcards]
      summary: Delete a flashcard set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /flashcard-sets/{id}/progress:
    patch:
      operationId: updateFlashcardProgress
      tags: [flashcards]
      summary: Update study progress for a flashcard set
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlashcardProgressUpdate"
      responses:
        "200":
          description: Updated flashcard set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlashcardSet"

  # ── Analytics ─────────────────────────────────────────────────────────────────
  /analytics/dashboard:
    get:
      operationId: getDashboardStats
      tags: [analytics]
      summary: Overall dashboard statistics
      responses:
        "200":
          description: Dashboard statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

  /analytics/activity:
    get:
      operationId: getLearningActivity
      tags: [analytics]
      summary: Daily learning activity for the past 30 days
      responses:
        "200":
          description: Activity feed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityEntry"

  /analytics/topics:
    get:
      operationId: getTopTopics
      tags: [analytics]
      summary: Most searched/studied topics
      responses:
        "200":
          description: Top topics
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopicStat"

  /analytics/quiz-performance:
    get:
      operationId: getQuizPerformance
      tags: [analytics]
      summary: Quiz performance over time
      responses:
        "200":
          description: Quiz performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/QuizPerformanceEntry"

  # ── Users ────────────────────────────────────────────────────────────────────
  /users/profile:
    get:
      operationId: getProfile
      tags: [users]
      summary: Get current user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/login:
    post:
      operationId: loginUser
      tags: [users]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /users/register:
    post:
      operationId: registerUser
      tags: [users]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Documents ──────────────────────────────────────────────────────────────
    Document:
      type: object
      required: [id, title, fileType, fileSize, status, chunkCount, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        filename:
          type: ["string", "null"]
        fileType:
          type: string
          enum: [pdf, docx, txt]
        fileSize:
          type: integer
        status:
          type: string
          enum: [processing, ready, error]
        chunkCount:
          type: integer
        topic:
          type: ["string", "null"]
        createdAt:
          type: string

    DocumentInput:
      type: object
      required: [title, fileType, fileSize, content]
      properties:
        title:
          type: string
        filename:
          type: string
        fileType:
          type: string
          enum: [pdf, docx, txt]
        fileSize:
          type: integer
        topic:
          type: string
        content:
          type: string

    DocumentStats:
      type: object
      required: [total, ready, processing, totalChunks, totalSize]
      properties:
        total:
          type: integer
        ready:
          type: integer
        processing:
          type: integer
        totalChunks:
          type: integer
        totalSize:
          type: integer

    # ── Chat ───────────────────────────────────────────────────────────────────
    Conversation:
      type: object
      required: [id, title, messageCount, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        messageCount:
          type: integer
        lastMessage:
          type: ["string", "null"]
        documentId:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    ConversationInput:
      type: object
      required: [title]
      properties:
        title:
          type: string
        documentId:
          type: integer

    Message:
      type: object
      required: [id, conversationId, role, content, createdAt]
      properties:
        id:
          type: integer
        conversationId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        sources:
          type: array
          items:
            $ref: "#/components/schemas/Source"
        createdAt:
          type: string

    Source:
      type: object
      required: [documentTitle, relevance]
      properties:
        documentTitle:
          type: string
        pageNumber:
          type: ["integer", "null"]
        excerpt:
          type: ["string", "null"]
        relevance:
          type: number

    ConversationDetail:
      type: object
      required: [id, title, messages, createdAt, updatedAt]
      properties:
        id:
          type: integer
        title:
          type: string
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
        documentId:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string

    MessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string

    # ── Quizzes ────────────────────────────────────────────────────────────────
    Quiz:
      type: object
      required: [id, title, questionCount, difficulty, topic, bestScore, attemptCount, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        questionCount:
          type: integer
        difficulty:
          type: string
          enum: [easy, medium, hard]
        topic:
          type: ["string", "null"]
        documentId:
          type: ["integer", "null"]
        bestScore:
          type: ["number", "null"]
        attemptCount:
          type: integer
        createdAt:
          type: string

    QuizGenerationInput:
      type: object
      required: [title, questionCount, difficulty]
      properties:
        title:
          type: string
        topic:
          type: string
        documentId:
          type: integer
        questionCount:
          type: integer
        difficulty:
          type: string
          enum: [easy, medium, hard]

    QuizQuestion:
      type: object
      required: [id, quizId, question, options, correctAnswer, explanation]
      properties:
        id:
          type: integer
        quizId:
          type: integer
        question:
          type: string
        options:
          type: array
          items:
            type: string
        correctAnswer:
          type: integer
        explanation:
          type: string

    QuizDetail:
      type: object
      required: [id, title, questions, difficulty, topic, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        questions:
          type: array
          items:
            $ref: "#/components/schemas/QuizQuestion"
        difficulty:
          type: string
          enum: [easy, medium, hard]
        topic:
          type: ["string", "null"]
        documentId:
          type: ["integer", "null"]
        createdAt:
          type: string

    QuizAttemptInput:
      type: object
      required: [answers, timeSpent]
      properties:
        answers:
          type: array
          items:
            type: integer
        timeSpent:
          type: integer

    QuizResult:
      type: object
      required: [quizId, score, correctCount, totalQuestions, timeSpent, passed]
      properties:
        quizId:
          type: integer
        score:
          type: number
        correctCount:
          type: integer
        totalQuestions:
          type: integer
        timeSpent:
          type: integer
        passed:
          type: boolean
        questionResults:
          type: array
          items:
            $ref: "#/components/schemas/QuestionResult"

    QuestionResult:
      type: object
      required: [questionId, selectedAnswer, correctAnswer, isCorrect]
      properties:
        questionId:
          type: integer
        selectedAnswer:
          type: integer
        correctAnswer:
          type: integer
        isCorrect:
          type: boolean
        explanation:
          type: string

    # ── Flashcards ─────────────────────────────────────────────────────────────
    FlashcardSet:
      type: object
      required: [id, title, cardCount, studiedCount, masteredCount, topic, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        cardCount:
          type: integer
        studiedCount:
          type: integer
        masteredCount:
          type: integer
        topic:
          type: ["string", "null"]
        documentId:
          type: ["integer", "null"]
        createdAt:
          type: string

    FlashcardGenerationInput:
      type: object
      required: [title, cardCount]
      properties:
        title:
          type: string
        topic:
          type: string
        documentId:
          type: integer
        cardCount:
          type: integer

    Flashcard:
      type: object
      required: [id, setId, front, back, mastered]
      properties:
        id:
          type: integer
        setId:
          type: integer
        front:
          type: string
        back:
          type: string
        mastered:
          type: boolean
        difficulty:
          type: ["string", "null"]

    FlashcardSetDetail:
      type: object
      required: [id, title, cards, topic, createdAt]
      properties:
        id:
          type: integer
        title:
          type: string
        cards:
          type: array
          items:
            $ref: "#/components/schemas/Flashcard"
        topic:
          type: ["string", "null"]
        documentId:
          type: ["integer", "null"]
        createdAt:
          type: string

    FlashcardProgressUpdate:
      type: object
      required: [masteredCardIds]
      properties:
        masteredCardIds:
          type: array
          items:
            type: integer

    # ── Analytics ──────────────────────────────────────────────────────────────
    DashboardStats:
      type: object
      required: [totalDocuments, totalConversations, totalQuizzes, totalFlashcardSets, averageQuizScore, studyStreak, totalStudyTime, weeklyMessages]
      properties:
        totalDocuments:
          type: integer
        totalConversations:
          type: integer
        totalQuizzes:
          type: integer
        totalFlashcardSets:
          type: integer
        averageQuizScore:
          type: number
        studyStreak:
          type: integer
        totalStudyTime:
          type: integer
        weeklyMessages:
          type: integer

    ActivityEntry:
      type: object
      required: [date, messageCount, quizCount, flashcardCount]
      properties:
        date:
          type: string
        messageCount:
          type: integer
        quizCount:
          type: integer
        flashcardCount:
          type: integer

    TopicStat:
      type: object
      required: [topic, count, percentage]
      properties:
        topic:
          type: string
        count:
          type: integer
        percentage:
          type: number

    QuizPerformanceEntry:
      type: object
      required: [date, averageScore, attemptCount]
      properties:
        date:
          type: string
        averageScore:
          type: number
        attemptCount:
          type: integer

    # ── Users ──────────────────────────────────────────────────────────────────
    UserProfile:
      type: object
      required: [id, name, email, role, joinedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [student, admin]
        avatar:
          type: ["string", "null"]
        bio:
          type: ["string", "null"]
        institution:
          type: ["string", "null"]
        joinedAt:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        bio:
          type: string
        institution:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [student, admin]

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        token:
          type: string
